<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuesta</title>
</head>
<body>
    <h1>Encuesta para desarrolladores</h1>
    <form action="{{ url_for('proceso') }}" method="POST">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre"><br><br>
        
        <p>Marca los lenguajes que usas:</p>
        <input type="checkbox" name="lenguajes" value="Python">Python<br>
        <input type="checkbox" name="lenguajes" value="Java">Java<br>
        <input type="checkbox" name="lenguajes" value="Kotlin">Kotlin<br>
        <input type="checkbox" name="lenguajes" value="Dart">Dart<br><br>
        
        <input type="submit" value="Enviar">
    </form>
</body>
</html>
