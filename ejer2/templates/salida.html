<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuesta - Resultados</title>
</head>
<body>
    <h1>Datos recibidos</h1>
    <p>Nombre: {{ nombre }}</p>
    
    {% if lenguajes %}
        <p>Los lenguajes de programación que más usas son:</p>
        <ul>
            {% for item in lenguajes %}
                <li>{{ item }}</li>
            {% endfor %}
        </ul>
    {% else %}
        <p>No hay selección de lenguajes de programación.</p>
    {% endif %}

    <br>
    <a href="{{ url_for('index') }}">Volver a la encuesta</a>
</body>
</html>
